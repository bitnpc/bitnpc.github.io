<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a21caf"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e7ff"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <circle cx="200" cy="200" r="200" fill="url(#bg)"/>

  <!-- Developer silhouette (head + shoulders, geometric) -->
  <!-- Head -->
  <circle cx="200" cy="130" r="38" fill="none" stroke="url(#glow)" stroke-width="3.5" opacity="0.9"/>
  <!-- Body / shoulders -->
  <path d="M155 200 Q155 170 200 168 Q245 170 245 200" fill="none" stroke="url(#glow)" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Shoulders horizontal -->
  <line x1="138" y1="200" x2="262" y2="200" stroke="url(#glow)" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Code brackets &lt;/&gt; -->
  <text dominant-baseline="central" fill="#f0e7ff" font-family="'SF Mono','JetBrains Mono','Cascadia Code',monospace" font-size="52" font-weight="700" text-anchor="middle" x="200" y="262">&lt;/&gt;</text>

  <!-- AI sparkle nodes (neural network dots) -->
  <g opacity="0.85">
    <!-- Top-left node cluster -->
    <circle cx="108" cy="118" r="5" fill="#fbbf24"/>
    <circle cx="98" cy="105" r="3" fill="#fbbf24" opacity="0.7"/>
    <line x1="108" y1="118" x2="145" y2="125" stroke="#fbbf24" stroke-width="1.2" opacity="0.4"/>
    <line x1="108" y1="118" x2="98" y2="105" stroke="#fbbf24" stroke-width="1" opacity="0.3"/>
    <!-- Top-right node cluster -->
    <circle cx="292" cy="118" r="5" fill="#34d399"/>
    <circle cx="302" cy="105" r="3" fill="#34d399" opacity="0.7"/>
    <line x1="292" y1="118" x2="255" y2="125" stroke="#34d399" stroke-width="1.2" opacity="0.4"/>
    <line x1="292" y1="118" x2="302" y2="105" stroke="#34d399" stroke-width="1" opacity="0.3"/>
    <!-- Bottom-left node -->
    <circle cx="125" cy="268" r="4" fill="#60a5fa"/>
    <line x1="125" y1="268" x2="170" y2="262" stroke="#60a5fa" stroke-width="1" opacity="0.3"/>
    <!-- Bottom-right node -->
    <circle cx="275" cy="268" r="4" fill="#c084fc"/>
    <line x1="275" y1="268" x2="230" y2="262" stroke="#c084fc" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Tiny sparkle dots -->
  <g opacity="0.5">
    <circle cx="80" cy="170" r="1.5" fill="#fde68a"/>
    <circle cx="320" cy="160" r="1.5" fill="#fde68a"/>
    <circle cx="90" cy="230" r="1.5" fill="#a5f3fc"/>
    <circle cx="310" cy="240" r="1.5" fill="#a5f3fc"/>
    <circle cx="200" cy="310" r="2" fill="#e9d5ff"/>
    <circle cx="160" cy="320" r="1.5" fill="#bbf7d0"/>
    <circle cx="240" cy="322" r="1.5" fill="#fecdd3"/>
  </g>
</svg>
