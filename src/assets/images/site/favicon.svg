<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="1000" height="1000" rx="200" ry="200" fill="url(#bg)"/>

  <!-- Code bracket: &lt;/&gt; -->
  <text dominant-baseline="central" fill="#ffffff" font-family="'SF Mono','JetBrains Mono','Cascadia Code',monospace" font-size="380" font-weight="700" text-anchor="middle" x="500" y="510">&lt;/&gt;</text>

  <!-- AI sparkle accent lines (simplified for small sizes) -->
  <!-- Top-left diamond -->
  <polygon points="220,300 238,320 220,340 202,320" fill="#fbbf24"/>
  <!-- Top-right diamond -->
  <polygon points="780,300 798,320 780,340 762,320" fill="#34d399"/>
</svg>
