<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 5000 2625">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" style="stop-color:#312e81"/>
      <stop offset="40%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="codeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" style="stop-color:#c7d2fe"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="5000" height="2625" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern background -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="875" x2="5000" y2="875"/>
    <line x1="0" y1="1750" x2="5000" y2="1750"/>
    <line x1="1667" y1="0" x2="1667" y2="2625"/>
    <line x1="3333" y1="0" x2="3333" y2="2625"/>
    <!-- Sub-grid -->
    <g opacity="0.4">
      <line x1="0" y1="438" x2="5000" y2="438"/>
      <line x1="0" y1="1312" x2="5000" y2="1312"/>
      <line x1="0" y1="2187" x2="5000" y2="2187"/>
      <line x1="417" y1="0" x2="417" y2="2625"/>
      <line x1="1250" y1="0" x2="1250" y2="2625"/>
      <line x1="2083" y1="0" x2="2083" y2="2625"/>
      <line x1="2917" y1="0" x2="2917" y2="2625"/>
      <line x1="3750" y1="0" x2="3750" y2="2625"/>
      <line x1="4583" y1="0" x2="4583" y2="2625"/>
    </g>
  </g>

  <!-- Center content group -->
  <!-- Left side: icon -->
  <g transform="translate(800,500)">
    <!-- Glow behind icon -->
    <circle cx="400" cy="400" r="350" fill="#6366f1" opacity="0.15"/>
    <circle cx="400" cy="400" r="260" fill="#818cf8" opacity="0.1"/>

    <!-- Developer silhouette: geometric head + shoulders -->
    <circle cx="400" cy="260" r="76" fill="none" stroke="url(#codeGrad)" stroke-width="7" opacity="0.9"/>
    <path d="M310 400 Q310 340 400 336 Q490 340 490 400" fill="none" stroke="url(#codeGrad)" stroke-width="7" stroke-linecap="round" opacity="0.55"/>
    <line x1="276" y1="400" x2="524" y2="400" stroke="url(#codeGrad)" stroke-width="5" stroke-linecap="round" opacity="0.3"/>

    <!-- Code brackets -->
    <text dominant-baseline="central" fill="url(#codeGrad)" font-family="'SF Mono','JetBrains Mono',monospace" font-size="100" font-weight="700" text-anchor="middle" x="400" y="520">&lt;/&gt;</text>

    <!-- AI sparkle nodes -->
    <g opacity="0.85">
      <!-- Top-left cluster -->
      <circle cx="200" cy="220" r="10" fill="#fbbf24"/>
      <circle cx="178" cy="198" r="6" fill="#fbbf24" opacity="0.65"/>
      <line x1="200" y1="220" x2="274" y2="234" stroke="#fbbf24" stroke-width="2" opacity="0.35"/>
      <line x1="200" y1="220" x2="178" y2="198" stroke="#fbbf24" stroke-width="1.5" opacity="0.25"/>
      <!-- Top-right cluster -->
      <circle cx="600" cy="220" r="10" fill="#34d399"/>
      <circle cx="622" cy="198" r="6" fill="#34d399" opacity="0.65"/>
      <line x1="600" y1="220" x2="526" y2="234" stroke="#34d399" stroke-width="2" opacity="0.35"/>
      <line x1="600" y1="220" x2="622" y2="198" stroke="#34d399" stroke-width="1.5" opacity="0.25"/>
      <!-- Bottom-left -->
      <circle cx="230" cy="540" r="8" fill="#60a5fa"/>
      <line x1="230" y1="540" x2="328" y2="526" stroke="#60a5fa" stroke-width="2" opacity="0.3"/>
      <!-- Bottom-right -->
      <circle cx="570" cy="540" r="8" fill="#c084fc"/>
      <line x1="570" y1="540" x2="472" y2="526" stroke="#c084fc" stroke-width="2" opacity="0.3"/>
    </g>

    <!-- Ambient sparkle dots -->
    <g opacity="0.4">
      <circle cx="150" cy="330" r="3" fill="#fde68a"/>
      <circle cx="650" cy="310" r="3" fill="#fde68a"/>
      <circle cx="170" cy="460" r="3" fill="#a5f3fc"/>
      <circle cx="630" cy="480" r="3" fill="#a5f3fc"/>
      <circle cx="400" cy="620" r="4" fill="#e9d5ff"/>
      <circle cx="310" cy="640" r="3" fill="#bbf7d0"/>
      <circle cx="490" cy="644" r="3" fill="#fecdd3"/>
    </g>
  </g>

  <!-- Right side: Text -->
  <g transform="translate(1800,700)">
    <!-- Title -->
    <text fill="#ffffff" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',system-ui,sans-serif" font-size="240" font-weight="700" x="0" y="180">Tony</text>

    <!-- Accent line under title -->
    <rect x="0" y="260" width="520" height="8" rx="4" fill="url(#accentGrad)" opacity="0.7"/>

    <!-- Tagline -->
    <text fill="#c7d2fe" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',system-ui,sans-serif" font-size="64" font-weight="400" x="0" y="420">iOS  ·  音视频  ·  AI</text>

    <!-- Subtitle -->
    <text fill="#a5b4fc" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',system-ui,sans-serif" font-size="48" font-weight="300" x="0" y="540">Developer &amp; Tinkerer</text>

    <!-- Bottom decorative: code line -->
    <g transform="translate(0,680)" opacity="0.3">
      <text fill="#818cf8" font-family="'SF Mono','JetBrains Mono',monospace" font-size="36" x="0" y="0">1  func build() -&gt; Future {</text>
      <text fill="#818cf8" font-family="'SF Mono','JetBrains Mono',monospace" font-size="36" x="0" y="48">2      await code.review()</text>
      <text fill="#818cf8" font-family="'SF Mono','JetBrains Mono',monospace" font-size="36" x="0" y="96">3      return blog.publish()</text>
      <text fill="#818cf8" font-family="'SF Mono','JetBrains Mono',monospace" font-size="36" x="0" y="144">4  }</text>
    </g>
  </g>

  <!-- Decorative bottom-right abstract shapes -->
  <g transform="translate(3800,1900)" opacity="0.06">
    <circle cx="400" cy="300" r="200" fill="none" stroke="#fbbf24" stroke-width="4"/>
    <circle cx="400" cy="300" r="140" fill="none" stroke="#34d399" stroke-width="4"/>
    <circle cx="400" cy="300" r="80" fill="none" stroke="#fbbf24" stroke-width="4"/>
    <!-- Cross lines -->
    <line x1="200" y1="300" x2="600" y2="300" stroke="#a5b4fc" stroke-width="2"/>
    <line x1="400" y1="100" x2="400" y2="500" stroke="#a5b4fc" stroke-width="2"/>
  </g>
</svg>
